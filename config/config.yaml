mode: paper

symbols:
  whitelist: ["BTC/USDT:USDT", "ETH/USDT:USDT", "BNB/USDT:USDT", "XRP/USDT:USDT", "TRX/USDT:USDT"]

limits:
  max_open_total: 6
  max_open_per_symbol: 4
  no_hedge: true

risk:
  size_pct_of_equity: 0.02
  equity_usdt: 1000.0
  max_risk_per_trade_pct: 0.005       # 0,5% (antes 0.5 = 50%)
  max_cluster_side_exposure_pct: 60.0
  clusters:
    "BTC/USDT:USDT": "MAJORS"
    "ETH/USDT:USDT": "MAJORS"
    "BNB/USDT:USDT": "MAJORS"
    "XRP/USDT:USDT": "MAJORS"
    "TRX/USDT:USDT": "MAJORS"

strategy:
  timeframe: "5m"

  # Umbrales base
  adx_min: 18
  bbwidth_min: 10
  atr_len: 14
  adx_len: 14

  layers:
    ma:
      fast: 20
      slow: 50
    rsi:
      period: 14
      range_low: 40
      range_high: 60
    structure:
      enabled: true

  entry:
    confirm_layers: ["ma", "rsi", "structure"]
    tp1_R: 1.0
    tp2_R: 2.0

  trailing:
    mode: "atr"
    atr_k: 1.5
    hysteresis_pct: 0.05
    min_step_pct: 0.05
    # Si usás otros modos:
    # ema_period: 20
    # percent: 0.4

funding:
  use_bias: true
  high_fr_threshold: 0.05
  avoid_minutes_around: 10

execution:
  slippage_bps: 5
  leverage: 10
  set_leverage: true
  retries: 3
  retry_backoff_s: 1.0
  time_sync: true

telegram:
  anti_spam:
    min_interval_s: 1.0
  dedup_window_s: 60
  language: "es"

persistence:
  dir: "data"
  sqlite_file: "data/trades.sqlite"
  equity_csv: "data/equity.csv"
  trades_csv: "data/trades.csv"
  state_file: "data/state.json"
  logs_file: "data/logs.csv"

leverage:
  min: 5
  max: 15
  default: 10

order_sizing:
  min_pct: 0.20
  default_pct: 0.30
  max_pct: 0.40
  min_pct_dca: 0.10
