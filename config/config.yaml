mode: paper

# Si usás tu start.py (que normaliza), podés dejar 'whitelist'.
# Si corrés el engine directo, cambiá esto por una lista simple:
# symbols: ["BTC/USDT:USDT", "ETH/USDT:USDT", "BNB/USDT:USDT", "XRP/USDT:USDT"]
symbols:
  whitelist: ["BTC/USDT:USDT", "ETH/USDT:USDT", "BNB/USDT:USDT", "XRP/USDT:USDT"]

limits:
  max_open_total: 6
  max_open_per_symbol: 4       # ← si querés evitar stacking por símbolo entre 1h/4h, ponelo en 1
  no_hedge: true
  # cooldown_seconds: 90  # (opcional) si querés explicitarlo

risk:
  size_pct_of_equity: 0.02
  equity_usdt: 1000.0
  max_risk_per_trade_pct: 0.005
  max_cluster_side_exposure_pct: 60.0
  clusters:
    "BTC/USDT:USDT": "MAJORS"
    "ETH/USDT:USDT": "MAJORS"
    "BNB/USDT:USDT": "MAJORS"
    "XRP/USDT:USDT": "MAJORS"

# Caps de cartera que el engine usa (dataclass Caps)
portfolio_caps:
  max_portfolio_leverage: 8.0
  max_portfolio_margin_pct: 1.0

# === DEFAULT (compatibilidad): se usa si tu engine no soporta 'strategies:' ===
strategy:
  timeframe: "1h"
  adx_min: 18
  bbwidth_min: 10         # 10 bps = 0.10%. Si querés 1%, poné 100.
  atr_len: 14
  adx_len: 14
  layers:
    ma: { fast: 20, slow: 50 }
    rsi: { period: 14, range_low: 40, range_high: 60 }
    structure: { enabled: true }
  entry:
    confirm_layers: ["ma", "rsi", "structure"]
    tp1_r: 1.0
    tp2_r: 2.0
  trailing:
    mode: "atr"
    atr_k: 1.5
    hysteresis_pct: 0.05
    # Podés usar uno u otro:
    # a) paso en ATR directamente:
    # min_step_atr: 0.5
    # b) paso en % del precio (el engine lo convierte a ATR en runtime):
    min_step_pct: 0.05
    # ema_period: 20   # si usás mode: ema
    # percent: 0.4     # si usás mode: percent

# === MULTI-TF (recomendado): 1h + 4h en paralelo ===
strategies:
  # 1H (las que validamos)
  - name: BTC_1h_BB_reversion
    symbol: BTC/USDT:USDT
    timeframe: 1h
    kind: BB_reversion
    params:
      z_threshold: 2.5          # z20 < -2.5
      ema200_filter: true       # exige close > EMA200
      hold_bars: 30             # salida por tiempo
      atr_len: 14
      adx_len: 14
      adx_min: 18
      bbwidth_min_bps: 10
      trail:
        mode: atr
        atr_k: 1.5
        hysteresis_pct: 0.05
        min_step_pct: 0.05

  - name: BNB_1h_Trend_pullback
    symbol: BNB/USDT:USDT
    timeframe: 1h
    kind: Trend_pullback
    params:
      ema_stack: [20, 50, 200]  # ema20>ema50>ema200
      pullback_pct: 0.01        # 1% bajo EMA20
      hold_bars: 30
      atr_len: 14
      adx_len: 14
      adx_min: 18
      bbwidth_min_bps: 10
      trail:
        mode: atr
        atr_k: 1.5
        hysteresis_pct: 0.05
        min_step_pct: 0.05

  # 4H (nuevas)
  - name: BTC_4h_BB_reversion
    symbol: BTC/USDT:USDT
    timeframe: 4h
    kind: BB_reversion
    params:
      z_threshold: 2.0          # más laxo en 4h
      ema200_filter: true
      hold_bars: 12             # ~2 días
      atr_len: 14
      adx_len: 14
      adx_min: 18
      bbwidth_min_bps: 6        # 4h suele tener bandas más “finas”
      trail:
        mode: atr
        atr_k: 1.5
        hysteresis_pct: 0.05
        min_step_pct: 0.05

  - name: BNB_4h_Trend_pullback
    symbol: BNB/USDT:USDT
    timeframe: 4h
    kind: Trend_pullback
    params:
      ema_stack: [20, 50, 200]
      pullback_pct: 0.008       # 0.8% en 4h
      hold_bars: 12
      atr_len: 14
      adx_len: 14
      adx_min: 18
      bbwidth_min_bps: 6
      trail:
        mode: atr
        atr_k: 1.5
        hysteresis_pct: 0.05
        min_step_pct: 0.05

# Sesgo por funding (lo usan otros módulos; no molesta)
funding:
  use_bias: true
  high_fr_threshold: 0.05
  avoid_minutes_around: 10

# ★ Ventana de funding: tu engine espera estas claves
funding_window:
  enabled: true
  minutes: 10           # ← antes tenías 'avoid_minutes_around'
  fr_abs_bps_min: 300   # ← umbral de |funding| anualizado (en bps) para activar la guarda

execution:
  slippage_bps: 5
  leverage: 10
  set_leverage: true
  retries: 3
  retry_backoff_s: 1.0
  time_sync: true

fees:
  taker: 0.0005
  maker: 0.0002

telegram:
  send_legacy: false      # evita duplicar mensajes con Notifier clásico
  enabled: true
  anti_spam: { min_interval_s: 1.0 }
  dedup_window_s: 60
  language: "es"
  inline_commands: false  # usamos telegram_commands.py
  reports_in_bot: false   # usamos ReportingScheduler

persistence:
  dir: "data"
  sqlite_file: "data/trades.sqlite"
  equity_csv: "data/equity.csv"
  trades_csv: "data/trades.csv"
  state_file: "data/state.json"
  logs_file: "data/logs.csv"

leverage: { min: 5, max: 15, default: 10 }

order_sizing:
  min_pct: 0.20
  default_pct: 0.30
  max_pct: 0.40
  min_pct_dca: 0.10

# ★ Guard de correlación: el engine lo usa
correlation_guard:
  enabled: true
  same_side_max_exposure_ratio: 0.60
  clusters:
    - ["BTC/USDT:USDT", "ETH/USDT:USDT", "BNB/USDT:USDT", "XRP/USDT:USDT"]
